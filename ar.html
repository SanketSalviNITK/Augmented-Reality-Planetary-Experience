<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorer | MindAR Mode</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        #ar-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .instruction-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(79, 172, 254, 0.3);
            max-width: 300px;
            pointer-events: auto;
        }

        .exit-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .exit-btn:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff4b2b;
        }

        #status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1000;
            transition: all 0.3s;
        }

        /* MindAR Overlay styles */
        .mindar-ui-scanning {
            background: rgba(0,0,0,0.5) !important;
        }
        .mindar-ui-loading {
            background: #0b0e14 !important;
            color: #4facfe !important;
        }
    </style>
</head>

<body>
    <div id="ar-ui">
        <div class="instruction-card">
            <h2 style="margin: 0; font-size: 1.2rem; color: #4facfe;">MindAR Active</h2>
            <p style="font-size: 0.9rem; margin: 10px 0 0; opacity: 0.8;">
                Point your camera at the planet images in your booklet.
            </p>
        </div>
    </div>

    <div id="status-indicator">Initializing Engine...</div>
    <div id="target-index-display" style="position: fixed; top: 60px; right: 20px; padding: 8px 15px; background: rgba(255, 255, 255, 0.2); color: white; border-radius: 20px; font-size: 0.8rem; z-index: 1000; border: 1px solid rgba(255,255,255,0.3);">Detected Index: None</div>

    <a href="index.html" class="exit-btn">Exit AR Mode</a>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; maxTrack: 2" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="sun-model" src="assets/sun.glb"></a-asset-item>
            <a-asset-item id="mercury-model" src="assets/mercury.glb"></a-asset-item>
            <a-asset-item id="venus-model" src="assets/venus.glb"></a-asset-item>
            <a-asset-item id="earth-model" src="assets/earth.glb"></a-asset-item>
            <a-asset-item id="mars-model" src="assets/mars.glb"></a-asset-item>
            <a-asset-item id="jupiter-model" src="assets/jupiter.glb"></a-asset-item>
            <a-asset-item id="saturn-model" src="assets/saturn.glb"></a-asset-item>
            <a-asset-item id="uranus-model" src="assets/uranus.glb"></a-asset-item>
            <a-asset-item id="neptune-model" src="assets/neptune.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <!-- Image Targets -->
        <!-- Note: Target indices correspond to the order you upload them to the MindAR compiler -->
        
        <a-entity mindar-image-target="targetIndex: 6">
            <a-entity gltf-model="#sun-model" scale="0.4 0.4 0.4" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3">
            <a-entity gltf-model="#mercury-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 8">
            <a-entity gltf-model="#venus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#earth-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-entity gltf-model="#mars-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-entity gltf-model="#jupiter-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 5">
            <a-entity gltf-model="#saturn-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 7">
            <a-entity gltf-model="#uranus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 4">
            <a-entity gltf-model="#neptune-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        const status = document.getElementById('status-indicator');
        
        window.addEventListener('load', () => {
            status.innerText = 'Scanning...';
        });

        // Track targets
        const targets = document.querySelectorAll('[mindar-image-target]');
        targets.forEach((target, index) => {
            target.addEventListener("targetFound", event => {
                const targetIdx = target.getAttribute('mindar-image-target').split(':')[1].trim();
                const indexDisplay = document.getElementById('target-index-display');
                indexDisplay.innerText = 'Detected Index: ' + targetIdx;
                
                status.innerText = 'Planet Detected!';
                status.style.background = 'rgba(79, 172, 254, 0.3)';
                status.style.color = '#4facfe';
                status.style.borderColor = '#4facfe';
            });
            target.addEventListener("targetLost", event => {
                const indexDisplay = document.getElementById('target-index-display');
                indexDisplay.innerText = 'Detected Index: None';
                status.innerText = 'Scanning...';
                status.style.background = 'rgba(0, 255, 0, 0.1)';
                status.style.color = '#00ff00';
                status.style.borderColor = '#00ff00';
            });
        });
    </script>
</body>

</html>
