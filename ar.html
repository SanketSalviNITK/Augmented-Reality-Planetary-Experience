<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorer | AR Mode</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        #ar-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .instruction-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 300px;
            pointer-events: auto;
        }

        .exit-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .exit-btn:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: red;
        }

        #status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="ar-ui">
        <div class="instruction-card">
            <h2 style="margin: 0; font-size: 1.2rem; color: #4facfe;">AR Scanner Active</h2>
            <p style="font-size: 0.9rem; margin: 10px 0 0; opacity: 0.8;">
                Point your camera at a planet's marker in the printed booklet to see it come to life!
            </p>
        </div>
    </div>

    <div id="status-indicator">Scanning...</div>

    <a href="index.html" class="exit-btn">Exit AR Mode</a>

    <a-scene embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; labelingMode: black_region; patternRatio: 0.75; sourceWidth:640; sourceHeight:480; displayWidth: 640; displayHeight: 480;"
        renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: high;" vr-mode-ui="enabled: false">

        <a-assets>
            <!-- Planet Models -->
            <a-asset-item id="sun-model" src="assets/sun.glb"></a-asset-item>
            <a-asset-item id="mercury-model" src="assets/mercury.glb"></a-asset-item>
            <a-asset-item id="venus-model" src="assets/venus.glb"></a-asset-item>
            <a-asset-item id="earth-model" src="assets/earth.glb"></a-asset-item>
            <a-asset-item id="mars-model" src="assets/mars.glb"></a-asset-item>
            <a-asset-item id="jupiter-model" src="assets/jupiter.glb"></a-asset-item>
            <a-asset-item id="saturn-model" src="assets/saturn.glb"></a-asset-item>
            <a-asset-item id="uranus-model" src="assets/uranus.glb"></a-asset-item>
            <a-asset-item id="neptune-model" src="assets/neptune.glb"></a-asset-item>
        </a-assets>

        <!-- 
            NOTE: For the Anchor-Gen markers to work, we need .patt files.
            I will use standard Barcode markers as a fall-back/demo system 
            mapped to the planets, but we can later swap them for the .patt files.
        -->

        <!-- Sun Marker (Custom Pattern) -->
        <a-marker type="pattern" url="assets/patterns/pattern-sun_marker.patt" 
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#sun-model" scale="0.5 0.5 0.5" rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
        </a-marker>

        <!-- Mercury Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-mercury_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#mercury-model" scale="0.3 0.3 0.3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>
        </a-marker>

        <!-- Venus Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-venus_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#venus-model" scale="0.4 0.4 0.4"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-marker>

        <!-- Earth Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-earth_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#earth-model" scale="0.4 0.4 0.4"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-marker>

        <!-- Mars Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-mars_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#mars-model" scale="0.35 0.35 0.35"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-entity>
        </a-marker>

        <!-- Jupiter Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-jupiter_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#jupiter-model" scale="0.6 0.6 0.6"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"></a-entity>
        </a-marker>

        <!-- Saturn Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-saturn_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#saturn-model" scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear"></a-entity>
        </a-marker>

        <!-- Uranus Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-uranus_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#uranus-model" scale="0.45 0.45 0.45"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear"></a-entity>
        </a-marker>

        <!-- Neptune Marker -->
        <a-marker type="pattern" url="assets/patterns/pattern-neptune_marker.patt"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="#neptune-model" scale="0.45 0.45 0.45"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Log marker detection for debugging
        window.addEventListener('markerFound', (e) => {
            console.log('Marker Found:', e.target.id);
            document.getElementById('status-indicator').innerText = 'Object Detected!';
            document.getElementById('status-indicator').style.background = 'rgba(79, 172, 254, 0.4)';
            document.getElementById('status-indicator').style.borderColor = '#4facfe';
        });

        window.addEventListener('markerLost', (e) => {
            document.getElementById('status-indicator').innerText = 'Scanning...';
            document.getElementById('status-indicator').style.background = 'rgba(0, 255, 0, 0.2)';
            document.getElementById('status-indicator').style.borderColor = '#00ff00';
        });
    </script>
</body>

</html>
