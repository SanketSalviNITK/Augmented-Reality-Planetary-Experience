<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorer | MindAR Mode</title>
    <script>
        // HCI Fix: Ensure trailing slash for robust relative pathing
        if (!window.location.pathname.endsWith('/') && !window.location.pathname.split('/').pop().includes('.')) {
            window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
        }
    </script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        #ar-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .instruction-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            max-width: 280px;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .exit-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exit-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        #status-indicator {
            position: fixed;
            top: 25px;
            right: 25px;
            padding: 10px 20px;
            background: rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            border-radius: 30px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }

        /* MindAR Overlay styles */
        .mindar-ui-scanning {
            background: rgba(0,0,0,0.5) !important;
        }
        .mindar-ui-loading {
            background: #0b0e14 !important;
            color: #4facfe !important;
        }
    </style>
</head>

<body>
    <div class="scanline"></div>
    <div id="ar-ui">
        <div class="instruction-card">
            <h2 style="margin: 0; font-size: 1.2rem; color: #4facfe;">MindAR Active</h2>
            <p style="font-size: 0.9rem; margin: 10px 0 0; opacity: 0.8;">
                Point your camera at the planet images in your booklet.
            </p>
        </div>
    </div>

    <div id="status-indicator">Initializing Engine...</div>
    
    <button id="reset-ar" style="position: fixed; bottom: 30px; right: 20px; padding: 12px 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); color: white; border: 1px solid #4facfe; border-radius: 30px; cursor: pointer; z-index: 1000; font-family: 'Outfit', sans-serif;">🔄 Reset Tracking</button>

    <a href="index.html" id="exit-mission" class="exit-btn">Complete Mission</a>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; maxTrack: 2; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="sun-model" src="assets/sun.glb"></a-asset-item>
            <a-asset-item id="mercury-model" src="assets/mercury.glb"></a-asset-item>
            <a-asset-item id="venus-model" src="assets/venus.glb"></a-asset-item>
            <a-asset-item id="earth-model" src="assets/earth.glb"></a-asset-item>
            <a-asset-item id="mars-model" src="assets/mars.glb"></a-asset-item>
            <a-asset-item id="jupiter-model" src="assets/jupiter.glb"></a-asset-item>
            <a-asset-item id="saturn-model" src="assets/saturn.glb"></a-asset-item>
            <a-asset-item id="uranus-model" src="assets/uranus.glb"></a-asset-item>
            <a-asset-item id="neptune-model" src="assets/neptune.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <!-- Image Targets -->
        <!-- Each model is wrapped in an anchor entity for world-locking -->
        
        <a-entity mindar-image-target="targetIndex: 6" id="target-6">
            <a-entity class="planet-model" gltf-model="#sun-model" scale="0.25 0.25 0.25" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3" id="target-3">
            <a-entity class="planet-model" gltf-model="#mercury-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 8" id="target-8">
            <a-entity class="planet-model" gltf-model="#venus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
            <a-entity class="planet-model" gltf-model="#earth-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2" id="target-2">
            <a-entity class="planet-model" gltf-model="#mars-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" id="target-1">
            <a-entity class="planet-model" gltf-model="#jupiter-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 5" id="target-5">
            <a-entity class="planet-model" gltf-model="#saturn-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 7" id="target-7">
            <a-entity class="planet-model" gltf-model="#uranus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 4" id="target-4">
            <a-entity class="planet-model" gltf-model="#neptune-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear"></a-entity>
        </a-entity>

    </a-scene>

    <script type="module">
        import { telemetry } from './src/utils/telemetry.js';
        import { AssessmentModule } from './src/utils/assessment.js';
        import { audioManager } from './src/utils/audio.js';
        import { scoreManager } from './src/utils/ScoreManager.js';

        const assessment = new AssessmentModule(telemetry);
        const planetMap = {
            'target-6': 'sun',
            'target-3': 'mercury',
            'target-8': 'venus',
            'target-0': 'earth',
            'target-2': 'mars',
            'target-1': 'jupiter',
            'target-5': 'saturn',
            'target-7': 'uranus',
            'target-4': 'neptune'
        };

        const status = document.getElementById('status-indicator');
        const resetBtn = document.getElementById('reset-ar');
        
        // Score HUD Setup
        const scoreHud = document.createElement('div');
        scoreHud.id = 'score-hud';
        scoreHud.style.cssText = `
            position: fixed;
            top: 85px;
            right: 25px;
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 172, 254, 0.3);
            color: #4facfe;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        `;
        scoreHud.innerHTML = `<span style="font-size: 0.7rem; opacity: 0.6; text-transform: uppercase;">Score</span> <span id="current-score">0</span>`;
        document.body.appendChild(scoreHud);

        scoreManager.onUpdate((newScore) => {
            document.getElementById('current-score').innerText = newScore;
            scoreHud.style.transform = 'scale(1.1)';
            setTimeout(() => scoreHud.style.transform = 'scale(1)', 200);
        });

        const audioToggle = document.createElement('button');

        // Audio Toggle Setup
        audioToggle.id = 'audio-toggle-ar';
        audioToggle.innerHTML = '🔈';
        audioToggle.style.cssText = `
            position: fixed;
            top: 25px;
            left: 25px;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            border-radius: 12px;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        `;
        document.body.appendChild(audioToggle);

        audioToggle.onclick = () => {
            const isPlaying = audioManager.toggle();
            audioToggle.innerHTML = isPlaying ? '🔊' : '🔈';
            audioToggle.style.borderColor = isPlaying ? '#4facfe' : 'rgba(255, 255, 255, 0.2)';
            audioToggle.style.boxShadow = isPlaying ? '0 0 20px rgba(79, 172, 254, 0.4)' : 'none';
            audioToggle.style.background = isPlaying ? 'rgba(79, 172, 254, 0.2)' : 'rgba(0, 0, 0, 0.5)';
        };
        // Exit Logic: Save Score
        document.getElementById('exit-mission').onclick = (e) => {
            e.preventDefault();
            scoreManager.saveToLeaderboard();
            window.location.href = 'leaderboard.html';
        };

        const lockedTargets = new Set();
        const lockTimers = {};

        window.addEventListener('load', () => {
            status.innerText = 'Scanning...';
        });

        // Track targets
        const targets = document.querySelectorAll('[mindar-image-target]');
        targets.forEach((target) => {
            target.addEventListener("targetFound", event => {
                const idx = target.getAttribute('mindar-image-target').split(':')[1].trim();
                const map = { "6": "sun", "3": "mercury", "8": "venus", "0": "earth", "2": "mars", "1": "jupiter", "5": "saturn", "7": "uranus", "4": "neptune" };
                const planetKey = map[idx];

                const id = target.id;
                status.innerText = 'Locking Planet...';
                status.style.background = 'rgba(255, 165, 0, 0.3)';
                status.style.color = '#ffa500';

                // Clear any pending unlock/hide
                if (lockTimers[id]) clearTimeout(lockTimers[id]);

                // Start locking timer (2 seconds of stability required)
                lockTimers[id] = setTimeout(() => {
                    lockedTargets.add(id);
                    status.innerText = 'Planet Locked!';
                    status.style.background = 'rgba(79, 172, 254, 0.3)';
                    status.style.color = '#4facfe';
                    
                    telemetry.logEvent('spatial_lock', { 
                        planetId: id,
                        dwellTime: 2000 
                    });

                    scoreManager.addPoints(50); // Points for sustained focus

                    // Voiceover logic
                    if (planetKey) {
                        audioManager.speak(voiceSummaries[planetKey]);
                        // Show quiz after voiceover (approx 10s later)
                        setTimeout(() => {
                            if (lockedTargets.has(id)) assessment.showQuiz(planetKey);
                        }, 12000);
                    }
                }, 2000);
                
                telemetry.logEvent('target_found', { planetId: id });
                scoreManager.addPoints(10); // Discovery points
            });

            target.addEventListener("targetLost", event => {
                const id = target.id;
                if (lockTimers[id]) clearTimeout(lockTimers[id]);

                if (lockedTargets.has(id)) {
                    // Spatial Locking Active: Don't hide the model
                    status.innerText = 'Spatial Lock Active';
                } else {
                    // Hide if not locked yet
                    target.setAttribute('visible', false);
                    status.innerText = 'Scanning...';
                    status.style.background = 'rgba(0, 255, 0, 0.1)';
                    status.style.color = '#00ff00';
                }
                
                telemetry.logEvent('target_lost', { 
                    planetId: id,
                    wasLocked: lockedTargets.has(id)
                });
            });
        });

        // Reset AR logic
        resetBtn.addEventListener('click', () => {
            lockedTargets.clear();
            targets.forEach(t => {
                t.setAttribute('visible', false);
                const id = t.id;
                if (lockTimers[id]) clearTimeout(lockTimers[id]);
            });
            window.speechSynthesis.cancel();
            status.innerText = 'Tracker Reset';
            telemetry.logEvent('tracker_reset');
            setTimeout(() => status.innerText = 'Scanning...', 1000);
        });
    </script>
</body>

</html>
