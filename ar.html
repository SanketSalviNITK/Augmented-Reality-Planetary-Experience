<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorer | MindAR Mode</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="scanline"></div>
    <div id="status-indicator">Initializing Engine...</div>
    <button id="reset-ar" class="ar-control-btn" style="bottom: 30px; right: 20px;">🔄 Reset Tracking</button>
    <a href="./index.html" class="exit-btn">Complete Mission</a>

    <script>
        // HCI Stability: Calculate absolute project root to prevent pathing drift
        const ROOT_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        console.log('🚀 Cosmic Root Path set to:', ROOT_PATH);
    </script>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; maxTrack: 2; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets id="asset-manifest">
            <a-asset-item id="sun-model" src="./assets/sun.glb"></a-asset-item>
            <a-asset-item id="mercury-model" src="./assets/mercury.glb"></a-asset-item>
            <a-asset-item id="venus-model" src="./assets/venus.glb"></a-asset-item>
            <a-asset-item id="earth-model" src="./assets/earth.glb"></a-asset-item>
            <a-asset-item id="mars-model" src="./assets/mars.glb"></a-asset-item>
            <a-asset-item id="jupiter-model" src="./assets/jupiter.glb"></a-asset-item>
            <a-asset-item id="saturn-model" src="./assets/saturn.glb"></a-asset-item>
            <a-asset-item id="uranus-model" src="./assets/uranus.glb"></a-asset-item>
            <a-asset-item id="neptune-model" src="./assets/neptune.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <!-- Image Targets -->
        <!-- Each model is wrapped in an anchor entity for world-locking -->
        
        <a-entity mindar-image-target="targetIndex: 6" id="target-6">
            <a-entity class="planet-model" gltf-model="#sun-model" scale="0.25 0.25 0.25" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3" id="target-3">
            <a-entity class="planet-model" gltf-model="#mercury-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 8" id="target-8">
            <a-entity class="planet-model" gltf-model="#venus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
            <a-entity class="planet-model" gltf-model="#earth-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2" id="target-2">
            <a-entity class="planet-model" gltf-model="#mars-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" id="target-1">
            <a-entity class="planet-model" gltf-model="#jupiter-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 5" id="target-5">
            <a-entity class="planet-model" gltf-model="#saturn-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 7" id="target-7">
            <a-entity class="planet-model" gltf-model="#uranus-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear"></a-entity>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 4" id="target-4">
            <a-entity class="planet-model" gltf-model="#neptune-model" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear"></a-entity>
        </a-entity>

    </a-scene>

    <script type="module">
        import { telemetry } from './src/utils/telemetry.js';
        import { AssessmentModule } from './src/utils/assessment.js';
        import { audioManager } from './src/utils/audio.js';
        import { ARManager } from './src/core/ARManager.js';

        const voiceSummaries = {
            sun: "Welcome to the Sun, the blazing heart of our system! It contains 99.8% of all the mass in our neighborhood and is primarily made of Hydrogen and Helium. It is a G-type star that uses nuclear fusion to create light and heat.",
            mercury: "Meet Mercury, the smallest planet! It is closest to the Sun and has no atmosphere. A single day there lasts 59 Earth days, and it looks a lot like our Moon.",
            venus: "This is Venus, the hottest planet of all! It has thick clouds of sulfuric acid and rotates backwards compared to other planets. It is often called Earth's twin.",
            earth: "Welcome home to Earth! Our blue oasis is 71% water and the only planet known to have life. It is protected by an ozone layer and a strong magnetic field.",
            mars: "This is the Red Planet, Mars! Its red color comes from iron oxide, which is basically rust. It is home to Olympus Mons, the tallest volcano in the solar system.",
            jupiter: "Behold Jupiter, the king of planets! It is so big that 1,300 Earths could fit inside it. Look for the Great Red Spot—a storm that has been raging for hundreds of years.",
            saturn: "Saturn is the crown jewel, famous for its beautiful rings made of ice and rock. Its largest moon, Titan, is the only moon in the system with a thick atmosphere.",
            uranus: "This is Uranus, the ice giant! It is unique because it rotates on its side. Its beautiful blue-green color comes from methane gas in its atmosphere.",
            neptune: "Welcome to Neptune, the windiest world! It was discovered using math before anyone ever saw it through a telescope. It has the fastest winds in the solar system."
        };

        const assessment = new AssessmentModule(telemetry);
        const arManager = new ARManager(assessment, telemetry, voiceSummaries);

        // UI Setup: Audio Toggle
        const audioToggle = document.createElement('button');
        audioToggle.id = 'audio-toggle-ar';
        audioToggle.className = 'ar-control-btn';
        audioToggle.style.top = '25px';
        audioToggle.style.left = '25px';
        audioToggle.innerHTML = '🔈';
        document.body.appendChild(audioToggle);

        audioToggle.onclick = () => {
            const isPlaying = audioManager.toggle();
            audioToggle.innerHTML = isPlaying ? '🔊' : '🔈';
            audioToggle.classList.toggle('active', isPlaying);
        };

        // Score HUD
        const scoreHud = document.createElement('div');
        scoreHud.id = 'score-hud';
        scoreHud.innerHTML = `<span class="score-label">Mission Score</span> <span id="current-score">0</span>`;
        document.body.appendChild(scoreHud);

        import('./src/utils/ScoreManager.js').then(m => {
            m.scoreManager.onUpdate(s => document.getElementById('current-score').innerText = s);
        });
    </script>
</body>

</html>
