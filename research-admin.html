<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Admin | Cosmic Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
            border: none;
        }

        .btn-primary:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-label {
            opacity: 0.6;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-container {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.6;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .type-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .type-view_switch { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .type-target_found { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .type-spatial_lock { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
        .type-quiz_answered { background: rgba(249, 115, 22, 0.1); color: #f97316; }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Researcher Dashboard</h1>
                <p style="opacity: 0.6;">Analyze participant interaction data</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="index.html" class="btn">Exit Admin</a>
                <button id="export-btn" class="btn btn-primary">Export CSV</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-sessions">0</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-events">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-quiz-score">0%</div>
                <div class="stat-label">Avg Quiz Accuracy</div>
            </div>
        </div>

        <div class="log-container">
            <table id="log-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Session</th>
                        <th>Type</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>

        <div class="actions">
            <button id="clear-btn" class="btn" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">Clear All Data</button>
        </div>
    </div>

    <script type="module">
        import { telemetry } from './src/utils/telemetry.js';

        const logBody = document.getElementById('log-body');
        const exportBtn = document.getElementById('export-btn');
        const clearBtn = document.getElementById('clear-btn');

        function updateUI() {
            const logs = telemetry.getLogs();
            const flattened = [];
            let correctAnswers = 0;
            let totalQuizzes = 0;

            logs.forEach(s => {
                s.events.forEach(e => {
                    flattened.push({ session: s.id, ...e });
                    if (e.type === 'quiz_answered') {
                        totalQuizzes++;
                        if (e.isCorrect) correctAnswers++;
                    }
                });
            });

            document.getElementById('total-sessions').innerText = logs.length;
            document.getElementById('total-events').innerText = flattened.length;
            document.getElementById('avg-quiz-score').innerText = 
                totalQuizzes > 0 ? Math.round((correctAnswers / totalQuizzes) * 100) + '%' : '0%';

            logBody.innerHTML = flattened.reverse().slice(0, 50).map(e => `
                <tr>
                    <td style="white-space: nowrap;">${new Date(e.timestamp).toLocaleTimeString()}</td>
                    <td style="font-size: 0.7rem; opacity: 0.5;">${e.session.split('_')[1]}</td>
                    <td><span class="type-pill type-${e.type}">${e.type}</span></td>
                    <td style="font-size: 0.8rem; opacity: 0.8;">${JSON.stringify(e).replace(/\{|\}|"|session:|timestamp:|type:/g, '').slice(0, 100)}</td>
                </tr>
            `).join('');
        }

        exportBtn.onclick = () => {
            const csv = telemetry.exportCSV();
            if (!csv) return alert('No data to export');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `research_data_${Date.now()}.csv`);
            a.click();
        };

        clearBtn.onclick = () => {
            if (confirm('Are you sure you want to delete all research data? This cannot be undone.')) {
                telemetry.clearLogs();
                updateUI();
            }
        };

        updateUI();
    </script>
</body>
</html>
